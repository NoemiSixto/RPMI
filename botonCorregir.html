<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corregir</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        @font-face {
            font-family: "roboto";
            src: url(assets/fonts/Roboto-Regular.ttf);
        }

        body{
            margin: 0;
            height: 100vh;
            background: transparent;
            background-color: rgba(0, 0, 0, 0);
            overflow: hidden;
            font-family: roboto;
            user-select: none;
        }

        #corregir{
            width: 100vw;
            height: 100vh;
            border-radius: 10vw;
            color: aliceblue;
            background-color: rgb(173, 3, 3);
            font-size: 50vh;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="corregir">Corregir</div>

    <script>
        $("#corregir").on("click", function(){
            console.log("corregir");
        })
    </script>
</body>
</html>
