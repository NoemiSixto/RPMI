<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        @font-face {
            font-family: "roboto";
            src: url(assets/fonts/Roboto-Regular.ttf);
        }

        body{
            margin: 0;
            height: 100vh;
            background-color: rgb(12, 71, 71);
            overflow: hidden;
            font-family: roboto;
            text-align: center;
        }

        /* BOTONES */

        .botones{
            display: flex;
            flex-direction: column;
            gap: 5vh;
            position: absolute;
            transform: translate(12.5%, 7.5%);
        }

        .botones h1{
            margin: 0;
            font-size: 5.5vh;
            font-weight: bold;
            color: aliceblue;
        }

        button{
            width: 80vw;
            color: aliceblue;
            font-size: 5vh;
            font-weight: bold;
            padding: 2vh 0;
            border: 5px solid rgb(14, 114, 114);
            border-radius: 3vh;
            background-color: rgb(41, 168, 168);
            cursor: pointer;
        }

        button:hover{
            color: rgb(227, 233, 237);
            border: 5px solid rgb(17, 150, 150);
            background-color: rgb(70, 181, 181);
        }

        button:active{
            color: rgb(169, 173, 176);
            border: 5px solid rgb(12, 90, 90);
            background-color: rgb(36, 139, 139);
        }
    </style>
</head>
<body>
    <div class="botones">
        <h1>PRUEBA MENÚ INICIO</h1>
        <a href="menuCategoria.html">
            <button id="jugar">JUGAR</button>
        </a>
        <button id="tutorial" onclick="tutorial()">TUTORIAL</button>
        <a href="menu2.html">
            <button id="opciones">OPCIONES</button>
        </a>
        <button id="web" onclick="web()">VISTA WEB</button>
        <button id="salir" onclick="salir()">SALIR</button>
    </div>

    <script>
        function tutorial(){
            console.log("msg:tutorial=tutorial");
        }

        function web(){
            console.log("msg:web=web");
        }

        function salir(){
            console.log("msg:salir=salir");
        }
    </script>
</body>
</html>
